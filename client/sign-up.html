<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ShareTrip</title>
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/auth.css">
</head>
<body class="auth-body">
  <div id="navbar-root"></div>

  <main class="auth-page">
    <section class="auth-intro">
      <img src="/images/sharetrip_logo.webp" alt="ShareTrip Logo" class="auth-logo">
      <h1>Share<span>Trip</span></h1>
      <p>Create your account and start sharing rides with the community.</p>
    </section>

    <section class="auth-panel">
      <div id="auth-message" class="message error" hidden></div>

      <form id="signUpForm" class="auth-form">
        <div class="form-row">
          <div>
            <label for="fname">First Name</label>
            <input id="fname" name="fname" type="text" required>
          </div>
          <div>
            <label for="lname">Last Name</label>
            <input id="lname" name="lname" type="text" required>
          </div>
        </div>

        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email">

        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="6" required autocomplete="new-password">

        <button type="submit">Create Account</button>
      </form>

      <a href="/sign-in.html" class="auth-secondary-button">Login</a>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    (async () => {
      await ShareTripNavbar.renderNavbar();

      const session = await ShareTripAuth.getSession();
      if (session.isAuthenticated) {
        window.location.href = "/dashboard.html";
        return;
      }

      const messageEl = document.getElementById("auth-message");

      document.getElementById("signUpForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        messageEl.hidden = true;

        try {
          const response = await fetch("/api/auth/signup", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              fname: formData.get("fname"),
              lname: formData.get("lname"),
              phone: formData.get("phone"),
              email: formData.get("email"),
              gender: formData.get("gender"),
              password: formData.get("password"),
            }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Sign up failed.");
          }
          window.location.href = "/dashboard.html";
        } catch (error) {
          messageEl.textContent = error.message;
          messageEl.className = "message error";
          messageEl.hidden = false;
        }
      });
    })();
  </script>
</body>
</html>
