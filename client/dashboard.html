<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | ShareTrip</title>
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/dashboard.css">
</head>
<body class="dashboard-body">
  <div id="navbar-root"></div>

  <div id="notification-banner" class="notification-banner" hidden></div>
  <div id="dashboard-message" class="dashboard-message site-fixed-alert" hidden></div>

  <main class="dashboard-page">
    <section class="dashboard-header">
      <div>
        <p class="eyebrow" id="welcome-eyebrow">Welcome</p>
        <h1>Ride Board</h1>
        <p>Browse every ride offer and request currently shared by the community.</p>
      </div>
      <a href="/dashboard.html?showForm=1#createRideForm" class="create-ride-btn" id="create-ride-link">Create Ride</a>
    </section>

    <section class="ride-filter-panel" id="ride-filter-panel" aria-label="Ride filters">
      <div class="ride-filter-tabs">
        <a href="/dashboard.html?scope=all" id="filter-all" data-scope="all">All Rides</a>
        <a href="/dashboard.html?scope=my" id="filter-my" data-scope="my">My Rides</a>
      </div>

      <div class="ride-filter-controls">
        <div class="ride-search-and-toggle">
          <form class="ride-search-form" id="searchForm">
            <input type="hidden" name="scope" id="search-scope" value="all">
            <label for="rideSearch">Search rides</label>
            <div class="ride-search-row">
              <input id="rideSearch" type="search" name="q" placeholder="Destination, state, or people">
              <button type="submit">Search</button>
            </div>
            <a href="#" class="clear-search-link" id="clear-search" hidden>Clear search</a>
          </form>

          <!-- Filter toggle button -->
          <button type="button" id="filter-toggle-btn" class="filter-toggle-btn" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
            <span id="filter-toggle-label">Filters</span>
          </button>
        </div>

        <!-- Advanced filter panel: all filters in one place -->
        <div id="advanced-filter-panel" hidden>
          <div class="advanced-filter-grid">
            <div class="filter-group">
              <label class="filter-group-label">Destination state</label>
              <select id="state-filter-select" class="filter-input">
                <option value="">All states</option>
                <option value="Idaho">Idaho</option>
                <option value="Montana">Montana</option>
                <option value="Wyoming">Wyoming</option>
                <option value="Utah">Utah</option>
                <option value="Nevada">Nevada</option>
                <option value="Oregon">Oregon</option>
                <option value="Washington">Washington</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="filter-group">
              <label class="filter-group-label">Date from</label>
              <input type="date" id="date-from-input" class="filter-input date-input">
            </div>

            <div class="filter-group">
              <label class="filter-group-label">Date to</label>
              <input type="date" id="date-to-input" class="filter-input date-input">
            </div>

            <div class="filter-group filter-group-checkboxes">
              <label class="filter-group-label">Show</label>
              <div class="filter-checkboxes">
                <label class="ride-filter-toggle" id="offers-only-filter">
                  <input type="checkbox"> Offers only
                </label>
                <label class="ride-filter-toggle" id="show-full-filter">
                  <input type="checkbox"> Show full rides
                </label>
                <label class="ride-filter-toggle" id="hide-request-rides-filter" hidden>
                  <input type="checkbox"> Hide driver requests
                </label>
                <label class="ride-filter-toggle" id="same-gender-only-filter" hidden>
                  <input type="checkbox"> Same gender only
                </label>
              </div>
            </div>
          </div>

          <button type="button" id="clear-date-filter" class="clear-filters-btn">Clear all filters</button>
        </div>
      </div>
    </section>

    <div id="ride-form-container"></div>

    <div id="rides-container">
      <section class="empty-rides" id="rides-loading">
        <h2>Loading rides…</h2>
        <p>Please wait while we fetch the ride board.</p>
      </section>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/dashboard-page.js" defer></script>
</body>
</html>
