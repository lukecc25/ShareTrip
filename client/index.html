<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareTrip</title>
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
  <div id="navbar-root"></div>

  <section class="hero">
    <div class="hero-content">
      <img src="/images/sharetrip_logo.webp" alt="ShareTrip Logo" class="hero-logo">
      <h1>Welcome to Share<span>Trip</span></h1>
      <h3>
        Connect with others to share rides, split fuel costs, and reduce your
        carbon footprint.<br>
        Create an account to start offering or requesting rides today!
      </h3>
      <a href="/sign-in.html" class="cta-btn">Get Started</a>
    </div>
  </section>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    (async () => {
      await ShareTripNavbar.renderNavbar();
      const session = await ShareTripAuth.getSession();
      if (session.isAuthenticated) {
        window.location.href = "/dashboard.html";
      }
    })();
  </script>
</body>
</html>
