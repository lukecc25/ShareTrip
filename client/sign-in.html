<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ShareTrip</title>
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/auth.css">
</head>
<body class="auth-body">
  <div id="navbar-root"></div>

  <main class="auth-page">
    <section class="auth-intro">
      <img src="/images/sharetrip_logo.webp" alt="ShareTrip Logo" class="auth-logo">
      <h1>Share<span>Trip</span></h1>
      <p>Offer rides, request seats, split fuel costs, and travel with people heading your way.</p>
    </section>

    <section class="auth-panel">
      <div id="auth-message" class="message error" hidden></div>

      <form id="signInForm" class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password">

        <button type="submit">Login</button>
      </form>

      <a href="/sign-up.html" class="auth-secondary-button">No Account? Create Account</a>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    (async () => {
      await ShareTripNavbar.renderNavbar();

      const messageEl = document.getElementById("auth-message");
      const params = new URLSearchParams(window.location.search);
      const authMessage = params.get("message") || params.get("error");
      const returnTo = params.get("returnTo");
      const safeReturnTo =
        returnTo && returnTo.startsWith("/") && !returnTo.startsWith("//")
          ? returnTo
          : "/dashboard.html";

      const session = await ShareTripAuth.getSession();
      if (session.isAuthenticated) {
        window.location.href = safeReturnTo;
        return;
      }

      if (authMessage) {
        messageEl.textContent = authMessage;
        messageEl.hidden = false;
      }

      document.getElementById("signInForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        messageEl.hidden = true;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: formData.get("email"),
              password: formData.get("password"),
            }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Login failed.");
          }
          window.location.href = safeReturnTo;
        } catch (error) {
          messageEl.textContent = error.message;
          messageEl.className = "message error";
          messageEl.hidden = false;
        }
      });
    })();
  </script>
</body>
</html>
