<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Post</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>

<!-- Page Header -->
  <header class="page-header">
    <h1>Create New Post</h1>
  </header>
 
  <!-- Main Form -->
  <main>
    <form class="post-form" id="postForm">
 
      <!-- Post Type Selection -->
      <section class="form-section post-type">
        <p class="section-label">What would you like to do?</p>
        <div class="post-type-buttons">
          <button type="button" class="type-btn offer-ride active" id="offerBtn">Offer a Ride</button>
          <button type="button" class="type-btn request-ride" id="requestBtn">Request a Ride</button>
        </div>
        <input type="hidden" name="postType" id="postType" value="offer">
      </section>
 
      <!-- Locations -->
      <section class="form-section locations">
        <div class="input-group">
          <label class="input-label" for="pickup">Pickup Location</label>
          <input type="text" id="pickup" name="pickup" placeholder="Pickup" class="form-input" required>
        </div>
 
        <div class="input-group">
          <label class="input-label" for="dropoff">Drop-off Location</label>
          <input type="text" id="dropoff" name="dropoff" placeholder="Drop-off" class="form-input" required>
        </div>
 
        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="middleStop">Middle Stop (Optional)</label>
            <input type="text" id="middleStop" name="middleStop" placeholder="Optional stop" class="form-input">
          </div>
          <div class="flexible-day-group">
            <label class="toggle-label" for="flexibleDay">
              <input type="checkbox" id="flexibleDay" name="flexibleDay" class="toggle-input">
              <span class="toggle-switch"></span>
              Flexible Day
            </label>
          </div>
        </div>
      </section>
 
      <!-- Date & Time -->
      <section class="form-section date-time">
        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="date">Date</label>
            <input type="date" id="date" name="date" class="form-input" required>
          </div>
          <div class="input-group">
            <label class="input-label" for="time">Time</label>
            <input type="time" id="time" name="time" class="form-input" required>
          </div>
        </div>
      </section>
 
      <!-- Details: Offer -->
      <section class="form-section details offer-only">
        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="seats">Available Seats</label>
            <input type="number" id="seats" name="seats" placeholder="Available" class="form-input" min="1" max="8">
          </div>
          <div class="input-group">
            <label class="input-label" for="tripType">Trip Type</label>
            <select id="tripType" name="tripType" class="form-input form-select">
              <option value="" disabled selected></option>
              <option value="one-way">One Way Trip</option>
              <option value="round-trip">Round Trip</option>
            </select>
          </div>
        </div>
 
        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="fuelCost">Estimated Fuel Cost</label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">$</span>
              <input type="number" id="fuelCost" name="fuelCost" placeholder="Cost" class="form-input with-prefix" min="0" step="0.01">
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="genderPrefOffer">Gender Preference</label>
            <select id="genderPrefOffer" name="genderPrefOffer" class="form-input form-select">
              <option value="" disabled selected></option>
              <option value="same">Same Gender Only</option>
              <option value="none">No preference</option>
            </select>
          </div>
        </div>
      </section>
 
      <!-- Details: Request -->
      <section class="form-section details request-only hidden">
        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="passengers">Number of Passengers</label>
            <input type="number" id="passengers" name="passengers" placeholder="Passengers" class="form-input" min="1" max="8">
          </div>
          <div class="input-group">
            <label class="input-label" for="tripTypeReq">Trip Type</label>
            <select id="tripTypeReq" name="tripTypeReq" class="form-input form-select">
              <option value="" disabled selected></option>
              <option value="one-way">One Way Trip</option>
              <option value="round-trip">Round Trip</option>
            </select>
          </div>
        </div>
 
        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="genderPrefReq">Gender Preference</label>
            <select id="genderPrefReq" name="genderPrefReq" class="form-input form-select">
              <option value="" disabled selected></option>
              <option value="same">Same Gender Only</option>
              <option value="none">No preference</option>
            </select>
          </div>
        </div>
      </section>
 
      <!-- Description -->
      <section class="form-section description">
        <div class="input-group">
          <label class="input-label" for="description">Description (Optional)</label>
          <textarea id="description" name="description" placeholder="Add any extra details..." class="form-input form-textarea" rows="3"></textarea>
        </div>
      </section>
 
      <!-- Action Buttons -->
      <div class="form-actions">
        <button type="button" class="action-btn cancel-post" id="cancelBtn">Cancel Post</button>
        <button type="submit" class="action-btn submit-post">Submit Post</button>
      </div>
 
    </form>
  </main>
</body>
</html>
