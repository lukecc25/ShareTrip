<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Post</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo-area">
        <img src="images\sharetrip_logo.png" alt="ShareTrip Logo">

        <div class="logo-text">
            Share<span>Trip</span>
        </div>
        </div>
    </nav>
  <header>
    <h1>Create New Post</h1>
  </header>
  <main>
    <form class="post-form">
        <div class="post-type">
            <h3>What would you like to do?</h3>
            <button class="offer-ride">
                Offer a Ride
            </button>
            <button class="request-ride">
                Request a Ride
            </button>
        </div>
        <div class="locations">
            <label class="input-label">Pickup Location</label>
            <input>

            <label class="input-label">Drop-off Location</label>
            <input>

            <label class="input-label">Middle Stop(s) (Optional)</label>
            <input>
        </div>
        <div class="date-time">
            <label class="input-label"></label>
            <input>
        </div>
        <div class="details"></div>
        <div class="description"></div>
        <button class="cancel-post"></button>
        <button class="submit-post"></button>
    </form>
  </main>
    <nav></nav>
</body>
</html>
