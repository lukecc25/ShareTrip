<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShareTrip</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo-area">
      <!-- Replace with your logo -->
      <img src="images\sharetrip_logo.webp" alt="ShareTrip Logo">

      <div class="logo-text">
        Share<span>Trip</span>
      </div>
    </div>

    <button class="login-btn">
      Login / Sign Up
    </button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">

      <!-- Replace with your logo -->
      <img src="images\sharetrip_logo.webp" alt="ShareTrip Logo" class="hero-logo">

      <h1>
        Welcome to Share<span>Trip</span>
      </h1>

      <p>
        Connect with others to share rides, split fuel costs,
        and reduce your carbon footprint.<br>
        Create an account to start offering or requesting rides today!
      </p>

      <button class="cta-btn">
        Get Started
      </button>

    </div>
  </section>

</body>
</html>
